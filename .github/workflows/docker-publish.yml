name: Publish Docker Image

on:
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Build and Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Secrets Presence (Safe Debug)
        run: |
          if [ -z "$DOCKER_USER" ]; then
            echo "❌ DOCKERHUB_USERNAME is EMPTY"
          else
            echo "✅ DOCKERHUB_USERNAME is present (Length: ${#DOCKER_USER})"
          fi

          if [ -z "$DOCKER_TOKEN" ]; then
            echo "❌ DOCKERHUB_TOKEN is EMPTY"
          else
            echo "✅ DOCKERHUB_TOKEN is present (Length: ${#DOCKER_TOKEN})"
          fi
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            yodsarun/kilovolt-proxy:latest
            yodsarun/kilovolt-proxy:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max